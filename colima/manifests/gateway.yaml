apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: local-gateway
  namespace: default
spec:
  gatewayClassName: traefik
  listeners:
  - name: https-wildcard
    protocol: HTTPS
    port: 8443
    hostname: "*.${LOCAL_DOMAIN}"
    tls:
      mode: Terminate
      certificateRefs:
      - name: local-tls
    allowedRoutes:
      namespaces:
        from: All
